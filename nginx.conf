user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10G;

    # Performance optimizations for large files
    proxy_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 32 128k;
    proxy_busy_buffers_size 256k;

    upstream filebrowser {
        server filebrowser:80;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /srv;
        index index.html index.htm;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Proxy to FileBrowser
        location / {
            proxy_pass http://filebrowser;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # Increase timeouts for large uploads/downloads
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Direct file download (bypasses FileBrowser)
        location /direct/ {
            alias /srv/;
            sendfile on;
            tcp_nopush on;

            # Force download with correct headers
            add_header Content-Disposition "attachment; filename=$request_filename";

            # Large file optimization
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # Scanner status (read-only)
        location /scan-status {
            alias /var/log/scans.log;
            default_type text/plain;
        }
    }
}
